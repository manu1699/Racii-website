<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACII — Find a Cook</title>

<script src="js/auth.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#e0e0e0;
    color:#4a352c;
    overflow-x:hidden;
}

/* Header */
header nav {
    display:flex;
    align-items:center;
    padding:16px 32px;
    background: rgba(128,128,128,0.5);
    position:fixed;
    width:100%;
    top:0;
    z-index:100;
    gap:20px;
    border-bottom:1px solid #ddd;
}

nav a {
    text-decoration:none;
    color:#4a352c;
    font-weight:500;
}

.container {
    max-width:1200px;
    margin:120px auto 32px;
    padding:16px;
}

h2 {
    text-align:center;
    margin-bottom:24px;
}

.cook-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
    width:100%;
}

.cook-card {
    background:#fff;
    border-radius:16px;
    padding:16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
    transition:0.2s;
}

.cook-card:hover {
    transform:translateY(-6px);
}

.cook-card a {
    color:#ff7f50;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<header>
  <nav>
    <div class="logo">🍳 RACII</div>
    <a href="index.html">Home</a>
  </nav>
</header>

<div class="container">
  <h2>Find a Cook Near You</h2>

  <div id="cook-grid" class="cook-grid"></div>
</div>

<script>
async function loadCooks() {
  try {
    const res = await fetch("http://localhost:3000/api/cooks");
    const data = await res.text();
    let cooks = data ? JSON.parse(data) : [];

    // 👉 Fallback demo cooks if backend is empty
    if (!cooks.length) {
      cooks = [
        {
          id: "1",
          name: "Mario Chef",
          bio: "Italian home chef",
          city: "Florence",
          region: "Tuscany"
        },
        {
          id: "2",
          name: "Sofia Pasta Queen",
          bio: "Fresh homemade pasta expert",
          city: "Rome",
          region: "Lazio"
        },
        {
          id: "3",
          name: "Antonio Grill Master",
          bio: "Best grilled meat in town",
          city: "Naples",
          region: "Campania"
        }
      ];
    }

    const container = document.getElementById("cook-grid");

    container.innerHTML = cooks.map(cook => `
      <div class="cook-card">
        <h3>${cook.name}</h3>
        <p>${cook.bio || ""}</p>
        <p><b>City:</b> ${cook.city || ""}</p>
        <p><b>Region:</b> ${cook.region || ""}</p>
        <a href="cook-profile.html?id=${cook.id}">
          View Profile
        </a>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
    document.getElementById("cook-grid").innerHTML =
      "<p>Error loading cooks</p>";
  }
}

window.addEventListener("DOMContentLoaded", loadCooks);
</script>

</body>
</html>
