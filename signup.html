<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RACII — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .signup-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 100%;
    }
    h2 { text-align: center; margin-bottom: 30px; color: #333; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { transform: translateY(-2px); }
    .error { color: red; font-size: 0.9rem; display: none; }
    .success { color: green; font-size: 0.9rem; display: none; }
  </style>
</head>

<body>

<div class="signup-container">
  <h2>Create RACII Account</h2>

  <form id="signupForm" onsubmit="handleSignup(event)">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required>
    </div>

    <div class="form-group">
      <label>Join as</label>
      <select id="role" required>
        <option value="">Select Role</option>
        <option value="client">Client</option>
        <option value="cook">Cook</option>
      </select>
    </div>

    <button type="submit">Create Account</button>

    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox"></div>

  </form>
</div>

<script src="js/auth.js"></script>

<script>
async function handleSignup(e) {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();
  const type = document.getElementById("role").value;

  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  errorBox.style.display = "none";
  successBox.style.display = "none";

  // validation
  if (!name || !email || !password || !confirmPassword || !type) {
    errorBox.textContent = "All fields are required";
    errorBox.style.display = "block";
    return;
  }

  if (password !== confirmPassword) {
    errorBox.textContent = "Passwords do not match";
    errorBox.style.display = "block";
    return;
  }

  try {
    const res = await fetch(`${getApiUrl()}/api/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name,
        email,
        password,
        type   // IMPORTANT: matches your backend
      })
    });

    const data = await res.json();

    if (!res.ok) {
      errorBox.textContent = data.error || "Signup failed";
      errorBox.style.display = "block";
      return;
    }

    // save session
    localStorage.setItem("raciiUser", JSON.stringify(data.user));

    successBox.textContent = "Account created successfully!";
    successBox.style.display = "block";

    setTimeout(() => {
      window.location.href = type === "cook"
        ? "cook-dashboard.html"
        : "index.html";
    }, 1200);

  } catch (err) {
    console.error(err);
    errorBox.textContent = "Connection error. Please try again.";
    errorBox.style.display = "block";
  }
}
</script>

</body>
</html>
