<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACII — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.login-container {
  background: white;
  border-radius: 16px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  max-width: 400px;
  width: 100%;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #333;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: #555;
  font-weight: 500;
}

input, select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  transform: translateY(-2px);
}

.error {
  color: red;
  font-size: 0.9rem;
  display: none;
  margin-top: 10px;
}

.success {
  color: green;
  font-size: 0.9rem;
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-container">
  <h2>Login to RACII</h2>

  <form id="loginForm" onsubmit="handleLogin(event)">

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label>Login as</label>
      <select id="role" required>
        <option value="">Select Role</option>
        <option value="client">Client</option>
        <option value="cook">Cook</option>
      </select>
    </div>

    <button type="submit">Login</button>

    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox"></div>

  </form>
</div>

<script src="js/auth.js"></script>

<script>
async function handleLogin(event) {
  event.preventDefault();

  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value.trim();
  const role = document.getElementById('role').value;

  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');

  errorBox.style.display = 'none';
  successBox.style.display = 'none';

  if (!email || !password) {
    errorBox.textContent = "All fields are required";
    errorBox.style.display = "block";
    return;
  }

  try {
    const response = await fetch(`${getApiUrl()}/api/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password
      })
    });

    const data = await response.json();

    if (!response.ok) {
      errorBox.textContent = data.error || "Login failed";
      errorBox.style.display = "block";
      return;
    }

    const user = {
      id: data.user.id,
      name: data.user.name,
      type: data.user.type
    };
app.post('/api/cooks', async (req, res) => {
  try {
    console.log("🔥 COOK APPLICATION RECEIVED");

    const {
      name,
      bio,
      region,
      city,
      address,
      kitchenPhotos,
      dishPhotos,
      idProof,
      joinCooking,
      allowDrinks,
      learnCooking,
      eatWithMe
    } = req.body;

    if (!name || !bio || !region || !city || !address) {
      return res.status(400).json({ error: "Missing required fields" });
    }

    const newCook = {
      id: Date.now().toString(),
      name,
      bio,
      region,
      city,
      address,
      kitchenPhotos: kitchenPhotos || [],
      dishPhotos: dishPhotos || [],
      idProof: idProof || "",
      joinCooking: !!joinCooking,
      allowDrinks: !!allowDrinks,
      learnCooking: !!learnCooking,
      eatWithMe: !!eatWithMe,
      createdAt: new Date().toISOString()
    };

    db.data.cooks.push(newCook);
    await db.write();

    res.status(201).json({
      message: "Cook application saved successfully",
      cook: newCook
    });

  } catch (err) {
    console.error(err);
    res.status(500).json({ error: "Server error" });
  }
});
    loginUser(user);

    successBox.textContent = "Login successful! Redirecting...";
    successBox.style.display = "block";

    setTimeout(() => {
      window.location.href = user.type === "cook"
        ? "cook/dashboard.html"
        : "index.html";
    }, 1200);

  } catch (err) {
    console.error(err);
    errorBox.textContent = "Connection error. Please try again.";
    errorBox.style.display = "block";
  }
}
</script>

</body>
</html>
