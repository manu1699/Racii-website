<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RACII — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 100%;
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
    }
    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    .error {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-top: 4px;
      display: none;
    }
    .success {
      color: #27ae60;
      font-size: 0.9rem;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h2>Login to RACII</h2>
  
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" required>
      <div class="error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <div class="error" id="passwordError"></div>
    </div>

    <div class="form-group">
      <label for="role">Login as</label>
      <select id="role" required>
        <option value="">Select Role</option>
        <option value="client">Client</option>
        <option value="cook">Cook</option>
      </select>
    </div>

    <button type="submit">Login</button>
    <div class="error" id="formError"></div>
    <div class="success" id="formSuccess"></div>
  </form>

  <div class="login-link">
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    <p><a href="index.html">← Back to Home</a></p>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  async function handleLogin(event) {
    event.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const role = document.getElementById('role').value;
    
    // Clear previous errors
    document.getElementById('emailError').style.display = 'none';
    document.getElementById('passwordError').style.display = 'none';
    document.getElementById('formError').style.display = 'none';
    document.getElementById('formSuccess').style.display = 'none';
    
    // Validate
    if (!email || !password || !role) {
      document.getElementById('formError').textContent = 'All fields are required';
      document.getElementById('formError').style.display = 'block';
      return;
    }
    
    if (!email.includes('@')) {
      document.getElementById('emailError').textContent = 'Invalid email format';
      document.getElementById('emailError').style.display = 'block';
      return;
    }
    
    if (password.length < 6) {
      document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
      document.getElementById('passwordError').style.display = 'block';
      return;
    }
    
    try {
      const response = await fetch('https://racii-website.up.railway.app/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, type: role })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('raciiUser', JSON.stringify({ ...data.user, role }));
        document.getElementById('formSuccess').textContent = 'Login successful! Redirecting...';
        document.getElementById('formSuccess').style.display = 'block';
        setTimeout(() => {
          window.location.href = role === 'cook' ? '/cook/dashboard.html' : '/index.html';
        }, 1500);
      } else {
        document.getElementById('formError').textContent = data.error || 'Login failed';
        document.getElementById('formError').style.display = 'block';
      }
    } catch (err) {
      console.error(err);
      document.getElementById('formError').textContent = 'Connection error. Please try again.';
      document.getElementById('formError').style.display = 'block';
    }
  }
</script>

</body>
</html>
