<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RACII | Client Register</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .form-group { display:flex; align-items:center; margin-bottom:16px; }
    .form-group input[type="checkbox"] { margin-right:12px; }
    .error { color:red; margin-top:10px; display:none; }
    .success { color:green; margin-top:10px; display:none; }
  </style>
</head>

<body>

<header>
  <nav class="nav-bar">
    <div class="logo">🍳 RACII</div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="client-register.html" class="active">Client Register</a>
      <a href="client-login.html">Client Login</a>
      <a href="cook-register.html">Cook Register</a>
      <a href="cook-login.html">Cook Login</a>
    </div>
    <button id="theme-toggle">🌙</button>
  </nav>
</header>

<section class="form-section">
  <div class="form-container">
    <h2>Client Registration</h2>
    <p>Create your account to find and book amazing cooks!</p>

    <form id="client-register-form">

      <label>Full Name</label>
      <input type="text" id="name" required>

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Phone Number</label>
      <input type="tel" id="phone" required>

      <label>Food Preferences</label>
      <input type="text" id="preferences" required>

      <label>Password</label>
      <input type="password" id="password" required>

      <div class="form-group">
        <input type="checkbox" id="terms">
        <label for="terms">
          I agree to Terms & Conditions
        </label>
      </div>

      <button type="submit">Register</button>

      <div class="error" id="errorBox"></div>
      <div class="success" id="successBox"></div>

    </form>
  </div>
</section>

<script>
document.getElementById("client-register-form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  errorBox.style.display = "none";
  successBox.style.display = "none";

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const preferences = document.getElementById("preferences").value.trim();
  const password = document.getElementById("password").value.trim();
  const terms = document.getElementById("terms").checked;

  if (!terms) {
    errorBox.textContent = "Please accept terms";
    errorBox.style.display = "block";
    return;
  }

  try {
    const res = await fetch("http://localhost:3000/api/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        password,
        type: "client"   // 👈 IMPORTANT FIX
      })
    });

    const data = await res.json();

    if (!res.ok) {
      errorBox.textContent = data.error || "Registration failed";
      errorBox.style.display = "block";
      return;
    }

    successBox.textContent = "Registration successful!";
    successBox.style.display = "block";

    setTimeout(() => {
      window.location.href = "client-login.html";
    }, 1200);

  } catch (err) {
    console.error(err);
    errorBox.textContent = "Connection error";
    errorBox.style.display = "block";
  }
});
</script>

</body>
</html>
