<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACII | Cook Application</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #e0e0e0;
    color: #4a352c;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    background: rgba(128,128,128,0.5);
    border-bottom: 1px solid #ddd;
}

header .logo {
    font-size: 1.5rem;
    font-weight: 700;
}

nav a {
    margin-left: 16px;
    text-decoration: none;
    color: #4a352c;
    font-weight: 500;
}

main {
    margin: 100px auto 40px auto;
    max-width: 700px;
    background: #fff;
    padding: 32px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

h1 { text-align: center; }
p { text-align: center; }

form label { font-weight: 500; }

form input,
form textarea,
form select {
    width: 100%;
    padding: 10px;
    margin-top: 4px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.checkbox-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0;
}

button.btn {
    background: linear-gradient(90deg, #ff6b6b, #ff3b3b);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">🍳 RACII</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="booking.html">Book a Meal</a>
  </nav>
</header>

<main>
<h1>Apply as a Cook</h1>
<p>One time payment for 5 euros to stay in the app.</p>

<form id="cook-application">

  <label>Cook Name:</label>
  <input type="text" id="cook-name-input" required>

  <label>Short Bio:</label>
  <textarea id="cook-bio-input" required></textarea>

  <label>Region:</label>
  <select id="cook-region" required>
    <option value="">Select Region</option>
    <option value="lombardy">Lombardy</option>
    <option value="lazio">Lazio</option>
    <option value="tuscany">Tuscany</option>
    <option value="sicily">Sicily</option>
  </select>

  <label>City:</label>
  <select id="cook-city" required></select>

  <label>Address:</label>
  <input type="text" id="cook-address" required>

  <label>Kitchen Photos:</label>
  <input type="file" id="kitchen-pics" multiple>

  <label>Dishes Photos:</label>
  <input type="file" id="dish-pics" multiple>

  <label>ID Proof:</label>
  <input type="file" id="id-proof">

  <div class="checkbox-container">
    <input type="checkbox" id="join-cooking">
    <label>Guests can join while I cook</label>
  </div>

  <div class="checkbox-container">
    <input type="checkbox" id="allow-drinks">
    <label>Drinks allowed</label>
  </div>

  <div class="checkbox-container">
    <input type="checkbox" id="learn-cooking">
    <label>Guests can learn cooking</label>
  </div>

  <div class="checkbox-container">
    <input type="checkbox" id="eat-with-me">
    <label>Eat together option</label>
  </div>

  <button type="submit" class="btn">Submit Application</button>

</form>
</main>

<script src="js/auth.js"></script>

<script>
// Cities
const regionCities = {
  lombardy: ["Milan","Bergamo"],
  lazio: ["Rome","Latina"],
  tuscany: ["Florence","Pisa"],
  sicily: ["Palermo","Catania"]
};

document.getElementById('cook-region').addEventListener('change', function() {
  const citySelect = document.getElementById('cook-city');
  citySelect.innerHTML = "";

  if(regionCities[this.value]){
    regionCities[this.value].forEach(city=>{
      const opt = document.createElement("option");
      opt.value = city;
      opt.textContent = city;
      citySelect.appendChild(opt);
    });
  }
});

// Submit
document.getElementById('cook-application').addEventListener('submit', async function(e){
  e.preventDefault();

  const cook = {
    name: document.getElementById('cook-name-input').value.trim(),
    bio: document.getElementById('cook-bio-input').value.trim(),
    region: document.getElementById('cook-region').value,
    city: document.getElementById('cook-city').value,
    address: document.getElementById('cook-address').value.trim(),
    joinCooking: document.getElementById('join-cooking').checked,
    allowDrinks: document.getElementById('allow-drinks').checked,
    learnCooking: document.getElementById('learn-cooking').checked,
    eatWithMe: document.getElementById('eat-with-me').checked,
    type: "cook"
  };

  try {
    const res = await fetch("http://localhost:3000/api/cooks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cook)
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.error || "Failed to submit cook");
      return;
    }

    alert("Cook application submitted successfully!");
    this.reset();

  } catch (err) {
    console.error(err);
    alert("Connection error");
  }
});
</script>

</body>
</html>
