<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACII — Cook Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {--accent:#ff6b6b; --muted:#555;}

body {
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#f4f4f4;
}

.header {
  background:#fff;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  width:100%;
  top:0;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.logo { font-weight:700; font-size:1.5rem; }

.profile-container {
  max-width:900px;
  margin:120px auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
}

.profile-header {
  display:flex;
  gap:20px;
  align-items:center;
  flex-wrap:wrap;
  border-bottom:1px solid #ddd;
  padding-bottom:20px;
}

.profile-header img {
  width:120px;
  height:120px;
  border-radius:12px;
  object-fit:cover;
}

.photos-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.photos-grid img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🍳 RACII</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="find-cook.html">Back</a>
  </nav>
</div>

<main class="profile-container">
  <div id="profile">Loading...</div>
</main>

<script>
function getCookId(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

// ✅ FIXED SAFE VERSION
async function loadProfile(){

  const id = getCookId();
  const container = document.getElementById("profile");

  if(!id){
    container.innerHTML = "<p>Invalid cook ID</p>";
    return;
  }

  try {
    const res = await fetch("http://localhost:3000/api/cooks");
    const cooks = await res.json();

    const cook = cooks.find(c => c.id == id);

    if(!cook){
      container.innerHTML = "<p>Cook not found</p>";
      return;
    }

    container.innerHTML = `
      <div class="profile-header">
        <img src="${cook.kitchenPhotos?.[0] || 'https://via.placeholder.com/120'}">

        <div>
          <h2>${cook.name}</h2>
          <p><b>Bio:</b> ${cook.bio || ""}</p>
          <p><b>Region:</b> ${cook.region || ""}</p>
          <p><b>City:</b> ${cook.city || ""}</p>
          <p><b>Address:</b> ${cook.address || ""}</p>
        </div>
      </div>

      <h3>Dish Photos</h3>
      <div class="photos-grid">
        ${(cook.dishPhotos || []).map(img => `<img src="${img}">`).join("")}
      </div>

      <h3>Kitchen Photos</h3>
      <div class="photos-grid">
        ${(cook.kitchenPhotos || []).map(img => `<img src="${img}">`).join("")}
      </div>
    `;

  } catch(err){
    console.error(err);
    container.innerHTML = "<p>Connection error</p>";
  }
}

window.onload = loadProfile;
</script>

</body>
</html>
